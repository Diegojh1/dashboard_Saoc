name: Deploy via FTP → saocdigital.com

on:
  push:
    branches:
      - master
      - main
      - claude/landing-page-copywriting-SSKun

jobs:
  deploy:
    name: Build y Upload a Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Subir SOLO el código (sin node_modules — son cientos de MB)
      - name: Deploy código por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.197.80.14
          port: 21
          username: u917172208.diagnostico.saocdigital.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.*
            **/fix-passwords.js
            **/*.log
            **/npm-debug.log*
            **/tmp/**
            **/node_modules/**

      # Conectar por SSH y correr npm install en el servidor
      - name: npm install en el servidor (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.197.80.14
          port: 65002
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/domains/diagnostico.saocdigital.com/public_html
            npm install --omit=dev
            touch tmp/restart.txt
