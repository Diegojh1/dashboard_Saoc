name: Deploy via FTP → saocdigital.com

on:
  push:
    branches:
      - master
      - main
      - claude/landing-page-copywriting-SSKun

jobs:
  deploy:
    name: Upload y reiniciar en Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 1. Subir archivos via FTP ──────────────────────────────
      - name: Deploy archivos por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.197.80.14
          port: 21
          username: u917172208.diagnostico.saocdigital.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/fix-passwords.js
            **/*.log
            **/npm-debug.log*
            **/tmp/**

      # ── 2. SSH: instalar dependencias y reiniciar Passenger ────
      - name: npm install + reiniciar app (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.197.80.14
          port: 22
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/public_html
            npm install --omit=dev --silent
            mkdir -p tmp
            touch tmp/restart.txt
            echo "✅ Deploy completado: $(date)"
