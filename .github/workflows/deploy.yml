name: Deploy → saocdigital.com

on:
  push:
    branches:
      - master
      - main
      - claude/landing-page-copywriting-SSKun

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules: solo reinstala si cambia package-lock.json
      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-prod-${{ hashFiles('package-lock.json') }}

      - name: Instalar dependencias (solo si no hay cache)
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --omit=dev

      # FTP con estado: la primera vez sube todo (~48MB),
      # los siguientes deploys solo suben archivos CAMBIADOS (rápido)
      - name: Deploy por FTP (incremental)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.197.80.14
          port: 21
          username: u917172208.diagnostico.saocdigital.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.*
            **/fix-passwords.js
            **/*.log
            **/npm-debug.log*
