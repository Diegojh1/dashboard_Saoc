name: Deploy via FTP → saocdigital.com

on:
  push:
    branches:
      - master
      - main
      - claude/landing-page-copywriting-SSKun

jobs:
  deploy:
    name: Build y Upload a Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instalar dependencias de producción aquí en GitHub Actions
      # y subirlas junto con el código — sin necesidad de SSH
      - name: npm install (solo producción)
        run: npm install --omit=dev

      # Subir TODO incluyendo node_modules ya instalados
      - name: Deploy por FTP (código + node_modules)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.197.80.14
          port: 21
          username: u917172208.diagnostico.saocdigital.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.*
            **/fix-passwords.js
            **/*.log
            **/npm-debug.log*
            **/tmp/**
